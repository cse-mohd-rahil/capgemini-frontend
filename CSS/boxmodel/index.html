<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            border:1px solid;
            border-radius: 18px;
            height:250px;
            width: 250px;
            font-size: 20px;
            padding: 20px;
            text-align: center;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            background-color: rgb(226, 226, 230);
            margin: 180px auto;
        }
        button{
            background-color:green;
            border-radius: 11px;
            border: none;
            color: white;
            font-size: 18px;
            padding: 8px 16px;

        }
    </style>
</head>
<body>
    <div>
        <p><u>Name: <b>Kalam</b></u></p>
        <p>Role: <b>React Developer</b></p>
        <p>Company: <b>TestYantra</b></p>
        <p>Location: <b>Bangalore</b></p>
        <button>Follow</button>
    </div>
</body>
</html>
