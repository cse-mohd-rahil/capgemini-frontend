<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding:0;
            box-sizing: border-box;
        }
        .margin{
            width: 400px;
            margin: 100px auto;
            border: 2px dashed;
            margin: 10px auto 30px;
            background-color: rgb(203, 109, 41);
        }
        .border{
            border: 2px dashed;
            width: 300px;
            margin: 10px auto 30px;
            background-color: rgb(222, 216, 103);
        }
        .padding{
            border: 2px dashed;
            width: 200px;
            margin: 10px auto 30px;
            background-color: rgb(126, 204, 126);
        }
        .content{
            margin: 10px auto 30px;
            border: 2px dashed;
            width: 100px;
            background-color: rgb(167, 167, 233);
        }
    </style>
</head>
<body>
    <div class="margin">margin
        <div class="border">border
            <div class="padding">padding
                <div class="content">
                    content
                </div>
            </div>
        </div>
    </div>
</body>
</html>
