<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        main{
            height: 60vh;
            width: 60vw;
            background-color: rgb(48, 80, 88);
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr 1fr;
            margin: 60px auto;
            gap: 20px;
            padding: 20px;

        }
        .box{
            background-color: rgb(0, 255, 166);
            text-align: center;
            place-content: center;

        }
        .box1{
            grid-column-start: 1;
            grid-column-end: 4;
        }
        .box2{
            grid-row-start: 2;
            grid-row-end: 4;
        }
        .box3{
            grid-column-start: 2;
            grid-column-end: 4;
        }
        .box6{
            grid-column-start: 1;
            grid-column-end: 4;
        }
    </style>
</head>
<body>
    <main>
        <section class="box box1">1</section>
        <section class="box box2">2</section>
        <section class="box box3">3</section>
        <section class="box box4">4</section>
        <section class="box box5">5</section>
        <section class="box box6">6</section>
    </main>
</body>
</html>
