<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .rahil{
            height: 300px;
            width: 300px;
            background-color: rgb(174, 147, 115);
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 2;
            
        }
        .mehul{
            height: 300px;
            width: 300px;
            background-color: rgb(124, 222, 235);    
            position: absolute;
            top:10px;
            left: 150px;
        }
        .parth{
            height: 300px;
            width: 300px;
            background-color: rgb(237, 161, 232);
            position: absolute;
            top: 100px;
            left: 100px;
            z-index: 3;
            
        }
    </style>
</head>
<body>
    <div class="rahil">Rahil</div>
    <div class="mehul">Mehul</div>
    <div class="parth">Parth</div>
</body>
</html>
