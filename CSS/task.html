<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .card{
            text-align: center;
            height: 380px;
            width: 300px;
            margin: 100px auto;
            background-color: rgb(231, 229, 229);
            border-radius: 16px;
            box-shadow:2px 2px 7px 3px rgb(154, 21, 21);
            
        }
        h2,h3{
            margin-bottom: 6px;
        }
        img{
            height: 200px;
            padding-top: 10px;
        }
        button{
            background-color: green;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px;
            margin-top: 10px;
            cursor: pointer;
            box-shadow: 1px 1px 3px 2px rgb(55, 43, 43);
            
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="./headphone-image.webp" alt="">
        <h2>Headphone</h2>
        <h3>Electronics</h3>
        <h4>Price <strike>Rs.4500</strike> Rs. 3500</h4>
        <button>Add to cart</button>
    </div>
</body>
</html>
