<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            border: 2px solid grey;
            display: flex;
        }
        .box{
            border:2px solid red;
            height:60px;
        }
        .box1{
            flex-grow: 1;
        }
        .box2{
            flex-grow: 2;
        }
        .box3{
            flex-grow: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box box1">Hi..</div>
        <div class="box box2">Hello</div>
        <div class="box box3">Bye Bye</div>
    </div>
</body>
</html>
