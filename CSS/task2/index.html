<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <div class="card">
        <h1>Contact Us</h1>
        <form action="">
            <table>
                <tr>
                    <td>First Name *</td>
                    <td>Last Name *</td>
                </tr>
                <tr>
                    <td><input type="text" name="fname" id="fname"></td>
                    <td><input type="text" name="lname" id="lname"></td>
                </tr>
                <tr>
                    <td colspan="2">Email Address *</td>
                </tr>
                <tr>
                    <td colspan="2"><input type="email" name="" id=""></td>
                </tr>
                <tr>
                    <td colspan="2">Query Type *</td>
                </tr>
                <tr>
                    <td><div class="querydata"><input type="radio" name="query" id="radio">General Enquiry</div></td>
                    <td><div class="querydata1"><input type="radio" name="query" id="radio">Support Request</div></td>
                </tr>
                <tr>
                    <td colspan="2">Message *</td>
                </tr>
                <tr>
                    <td rowspan="" colspan="2"><textarea name="" id="" rows="5" cols="60"></textarea></td>
                </tr>
                <tr>
                    <td colspan="2"><input type="checkbox" name="" id="check"> I consent to being conducted by the team</td>
                </tr>
                <tr>
                    <td colspan="2"><input class="submit" type="submit" value="Submit"></td>
                </tr>
            </table>
        </form>
    </div>
</body>
</html>
